<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<title>ELYZA — Estamos a atualizar a loja</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    background:#f6efe6;color:#2b1f18;
    display:flex;align-items:center;justify-content:center;
    padding:24px;text-align:center;
  }
  .wrap{max-width:520px}
  .brand{
    font-family:'Playfair Display',Georgia,'Times New Roman',serif;
    font-size:clamp(48px,10vw,72px);letter-spacing:.18em;font-weight:400;
    color:#2b1f18;margin-bottom:56px;line-height:1;
  }
  h1{
    font-family:'Playfair Display',Georgia,'Times New Roman',serif;
    font-size:clamp(24px,5vw,32px);font-weight:400;
    letter-spacing:-.01em;line-height:1.25;margin-bottom:20px;color:#2b1f18;
  }
  p{
    font-size:15px;line-height:1.6;color:#6b5c52;
    max-width:400px;margin:0 auto;
  }
  .sparkle{color:#b7743a;margin-left:6px}
  .dot{
    display:inline-block;width:6px;height:6px;border-radius:50%;
    background:#b7743a;margin:40px 8px 0;animation:pulse 1.6s ease-in-out infinite;
  }
  .dot:nth-child(2){animation-delay:.2s}
  .dot:nth-child(3){animation-delay:.4s}
  @keyframes pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">ELYZA</div>
    <h1>Estamos a atualizar a loja</h1>
    <p>Voltaremos muito em breve. Obrigado pela sua paciência.<span class="sparkle">✨</span></p>
    <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  </div>
</body>
</html>
